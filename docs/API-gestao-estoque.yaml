openapi: 3.0.3
info:
  title: API de Gestao de Estoque
  version: 1.0.0
  description: |
    Especificacao OpenAPI para a API REST de gestao de estoque de consumo interno.

    Regras de negócio principais:
    - O saldo do item e acumulado em `total_quantity`.
    - A API deve expor sempre a validade mais próxima em `nearest_expiry`.
    - Não é permitido registrar uma saída (`USAGE`) acima do saldo disponível.
    - Toda entrada (`INPUT`) exige `unit_price`.
    - Quantidades e valores monetários devem preservar precisão decimal.
    - Datas simples na API usam o formato `DD-MM-YYYY`.
    - As datas de validade devem ser válidas e não podem ser datas passadas.

    Regras de preço:
    - `unit_price` é obrigatório para `INPUT` (pode ser 0).
    - `unit_price` não deve ser enviado para `USAGE`.
    - `unit_price` nunca é null no cadastro de item.
servers:
  - url: http://localhost:3000
    description: Ambiente local
tags:
  - name: Auth
    description: Autenticação administrativa
  - name: Items
    description: Cadastro, configuração e alertas de estoque
  - name: Movements
    description: Entradas e saidas com histórico imutável
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login administrativo
      description: Autentica o usuário administrador e retorna um token Bearer JWT.
      operationId: loginAdmin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  username: admin
                  password: admin123
      responses:
        '200':
          description: Token JWT gerado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciais inválidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /items:
    post:
      tags:
        - Items
      summary: Criar item
      description: Cria um item e configura os parâmetros de alerta e controle.
      operationId: createItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateItemRequest'
            examples:
              default:
                value:
                  name: Detergente neutro
                  unit: L
                  total_quantity: 10.000
                  unit_price: 5.50
                  min_estoque: 2.000
                  nearest_expiry: "31-08-2026"
                  expiry_lead_time: 30
                  is_active: true
      responses:
        '201':
          description: Item criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidDateFormat:
                  value:
                    code: INVALID_DATE_FORMAT
                    message: nearest_expiry deve estar no formato DD-MM-YYYY.
                invalidDate:
                  value:
                    code: INVALID_DATE
                    message: Esta data não é válida.
    get:
      tags:
        - Items
      summary: Listar itens
      description: Lista itens com paginação e filtros por nome e estado.
      operationId: listItems
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: name
          in: query
          description: Filtro parcial por nome do item.
          schema:
            type: string
        - name: is_active
          in: query
          description: Filtra por itens ativos ou inativos.
          schema:
            type: boolean
      responses:
        '200':
          description: Lista paginada de itens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedItemsResponse'
  /items/alerts:
    get:
      tags:
        - Items
      summary: Listar alertas
      description: Retorna itens com estoque baixo, validade próxima ou ambos.
      operationId: listItemAlerts
      parameters:
        - name: alert_type
          in: query
          description: Tipo de alerta a filtrar.
          schema:
            type: string
            enum:
              - LOW_ESTOQUE
              - EXPIRING_SOON
              - ALL
            default: ALL
      responses:
        '200':
          description: Lista de itens em estado de alerta.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemAlertsResponse'
  /items/{id}:
    patch:
      tags:
        - Items
      summary: Atualizar item
      description: Atualiza configurações do item ou realiza a sua inativação.
      operationId: updateItem
      parameters:
        - $ref: '#/components/parameters/ItemIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemRequest'
            examples:
              updateThresholds:
                value:
                  min_estoque: 5.000
                  expiry_lead_time: 45
              deactivate:
                value:
                  is_active: false
      responses:
        '200':
          description: Item atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidDateFormat:
                  value:
                    code: INVALID_DATE_FORMAT
                    message: nearest_expiry deve estar no formato DD-MM-YYYY.
                invalidDate:
                  value:
                    code: INVALID_DATE
                    message: Esta data não é válida.
        '404':
          description: Item não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
  /movements:
    post:
      tags:
        - Movements
      summary: Registar movimentação
      description: |
        Regista uma entrada (`INPUT`) ou saída (`USAGE`) de estoque.

        Regras de negocio:
        - `unit_price` e obrigatório para `INPUT`.
        - `USAGE` não pode exceder o saldo atual do item.
        - `balance_after` deve refletir o saldo residual após a operação.
        - Datas de validade não podem ser datas passadas.
      operationId: createMovement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMovementRequest'
            examples:
              input:
                value:
                  item_id: 1001
                  type: INPUT
                  quantity: 12.50
                  unit_price: 3,75
                  expiry_date: "15-09-2026"
                  reason: Compra mensal
              usage:
                value:
                  item_id: 1001
                  type: USAGE
                  quantity: 0,50
                  reason: Reposicão interna
      responses:
        '201':
          description: Movimentação registada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Movement'
        '400':
          description: Violacao de regra de negócio ou dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                insufficientBalance:
                  value:
                    code: INSUFFICIENT_BALANCE
                    message: Quantidade solicitada excede o saldo disponível.
                    details:
                      available_quantity: 5.000
                      requested_quantity: 5.100
                missingUnitPrice:
                  value:
                    code: UNIT_PRICE_REQUIRED
                    message: unit_price e obrigatório para movimentações do tipo INPUT.
                invalidDateFormat:
                  value:
                    code: INVALID_DATE_FORMAT
                    message: Data de validade deve estar no formato DD-MM-YYYY.
                invalidDate:
                  value:
                    code: INVALID_DATE
                    message: Esta data não é válida.
                expiryDateInThePast:
                  value:
                    code: EXPIRY_DATE_IN_THE_PAST
                    message: Data de validade não pode ser uma data passada.
        '404':
          description: Item não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /movements/{item_id}:
    get:
      tags:
        - Movements
      summary: Histórico de movimentações do item
      description: Retorna o histórico imutável de movimentações de um item específico.
      operationId: listItemMovements
      parameters:
        - $ref: '#/components/parameters/ItemIdPathForMovementParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Lista paginada do histórico de movimentações.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMovementsResponse'
        '404':
          description: Item não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - Movements
      summary: Operação não suportada
      description: Movimentações são imutáveis e não podem ser alteradas.
      operationId: replaceItemMovementHistoryNotAllowed
      responses:
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                immutable:
                  value:
                    code: METHOD_NOT_ALLOWED
                    message: Movimentações sao imutáveis. Utilize apenas POST para registo e GET para consulta.
    delete:
      tags:
        - Movements
      summary: Operação não suportada
      description: Movimentaçõess são imutáveis e não podem ser removidas.
      operationId: deleteItemMovementHistoryNotAllowed
      responses:
        '405':
          description: Method Not Allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ItemIdParam:
      name: id
      in: path
      required: true
      description: Identificador do item (número inteiro incremental começando de 1000).
      schema:
        type: integer
        minimum: 1000
    ItemIdPathForMovementParam:
      name: item_id
      in: path
      required: true
      description: Identificador do item (número inteiro incremental começando de 1000).
      schema:
        type: integer
        minimum: 1000
    PageParam:
      name: page
      in: query
      description: Número da página.
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: page_size
      in: query
      description: Quantidade de registos por página.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: admin123
    LoginResponse:
      type: object
      required:
        - token_type
        - access_token
        - expires_in
      properties:
        token_type:
          type: string
          example: Bearer
        access_token:
          type: string
        expires_in:
          type: string
          example: 8h
    Item:
      type: object
      required:
        - id
        - name
        - unit
        - total_quantity
        - min_estoque
        - expiry_lead_time
        - is_active
        - unit_price
      properties:
        id:
          type: integer
          minimum: 1000
          description: Identificador único do item (incremental começando de 1000).
        name:
          type: string
          minLength: 1
          maxLength: 255
        unit:
          $ref: '#/components/schemas/Unit'
        total_quantity:
          $ref: '#/components/schemas/DecimalQuantity'
        min_estoque:
          $ref: '#/components/schemas/DecimalQuantity'
        nearest_expiry:
          allOf:
            - $ref: '#/components/schemas/DateDdMmYyyy'
          nullable: true
          description: Data de validade mais proxima.
        expiry_lead_time:
          type: integer
          minimum: 0
          description: Dias de antecedencia para alerta de validade.
        unit_price:
          allOf:
            - $ref: '#/components/schemas/DecimalMoney'
          nullable: false
          description: Preço unitário do item. Nunca pode ser null. Use 0 para itens sem custo.  
        is_active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
          description: Data e hora em que o item foi deletado, ou null se ativo.
    CreateItemRequest:
      type: object
      required:
        - name
        - unit
        - total_quantity
        - min_estoque
        - expiry_lead_time
        - unit_price
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        unit:
          $ref: '#/components/schemas/Unit'
        total_quantity:
          $ref: '#/components/schemas/DecimalQuantity'
        min_estoque:
          $ref: '#/components/schemas/DecimalQuantity'
        unit_price:
          $ref: '#/components/schemas/DecimalMoney'  
        nearest_expiry:
          allOf:
            - $ref: '#/components/schemas/DateDdMmYyyy'
          nullable: true
        expiry_lead_time:
          type: integer
          minimum: 0
        is_active:
          type: boolean
          default: true
    UpdateItemRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        unit:
          $ref: '#/components/schemas/Unit'
        unit_price:
          $ref: '#/components/schemas/DecimalMoney'  
        min_estoque:
          $ref: '#/components/schemas/DecimalQuantity'
        nearest_expiry:
          allOf:
            - $ref: '#/components/schemas/DateDdMmYyyy'
          nullable: true
        expiry_lead_time:
          type: integer
          minimum: 0
        is_active:
          type: boolean
    Movement:
      type: object
      required:
        - id
        - item_id
        - type
        - quantity
        - balance_after
      properties:
        id:
          type: integer
          minimum: 1000
          description: Identificador único da movimentação (incremental começando de 1000).
        item_id:
          type: integer
          minimum: 1000
          description: Identificador do item associado (número inteiro incremental).
        type:
          $ref: '#/components/schemas/MovementType'
        quantity:
          $ref: '#/components/schemas/DecimalQuantity'
        unit_price:
          $ref: '#/components/schemas/DecimalMoney'
        balance_after:
          $ref: '#/components/schemas/DecimalQuantity'
        expiry_date:
          allOf:
            - $ref: '#/components/schemas/DateDdMmYyyy'
          nullable: true
        reason:
          type: string
          maxLength: 500
          nullable: true
        created_at:
          type: string
          format: date-time
    CreateMovementRequest:
      oneOf:
        - $ref: '#/components/schemas/CreateInputMovementRequest'
        - $ref: '#/components/schemas/CreateUsageMovementRequest'
    CreateInputMovementRequest:
      type: object
      required:
        - item_id
        - type
        - quantity
        - unit_price
      properties:
        item_id:
          type: integer
          minimum: 1000
          description: Identificador do item (número inteiro incremental começando de 1000).
        type:
          type: string
          enum:
            - INPUT
        quantity:
          $ref: '#/components/schemas/DecimalQuantity'
        unit_price:
          $ref: '#/components/schemas/DecimalMoney'
        expiry_date:
          allOf:
            - $ref: '#/components/schemas/DateDdMmYyyy'
          nullable: true
          description: Opcional na entrada, usado para recalcular `nearest_expiry`.
        reason:
          type: string
          maxLength: 500
          nullable: true
    CreateUsageMovementRequest:
      type: object
      required:
        - item_id
        - type
        - quantity
      properties:
        item_id:
          type: integer
          minimum: 1000
        type:
          type: string
          enum: [USAGE]
        quantity:
          $ref: '#/components/schemas/DecimalQuantity'
        reason:
          type: string
          maxLength: 500
          nullable: true
      additionalProperties: false
    PaginatedItemsResponse:
      type: object
      required:
        - data
        - page
        - page_size
        - total
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Item'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
    PaginatedMovementsResponse:
      type: object
      required:
        - data
        - page
        - page_size
        - total
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Movement'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer
    ItemAlertsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: array
          items:
            type: object
            required:
              - item
              - alerts
            properties:
              item:
                $ref: '#/components/schemas/Item'
              alerts:
                type: array
                items:
                  type: string
                  enum:
                    - LOW_ESTOQUE
                    - EXPIRING_SOON
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    Unit:
      type: string
      enum:
        - UN
        - KG
        - L
        - CX
        - PCT
    MovementType:
      type: string
      enum:
        - INPUT
        - USAGE
    DecimalQuantity:
      type: string
      pattern: '^\d+(\.\d{1,2})?$'
      example: "0.750"
      description: Quantidade decimal com ate 3 casas para evitar perda de precisão.
    DecimalMoney:
      type: string
      pattern: '^\d+(\.\d{1,4})?$'
      example: "3.7500"
      description: Valor monetário decimal. O arredondamento 4/5 e a compensacao da última parcela devem ser aplicados na camada de negocio.
    DateDdMmYyyy:
      type: string
      pattern: '^(0[1-9]|[12][0-9]|3[01])-(0[1-9]|1[0-2])-\d{4}$'
      example: "31-08-2026"
      description: Data no formato DD-MM-YYYY. A data deve ser válida (ex: 31-02-2026 é inválida). Datas de validade não podem ser passadas.
    DeleteItemResponse:
      type: object
      required:
        - message
        - deleted_at
      properties:
        message:
          type: string
          example: Item deletado com sucesso.
        deleted_at:
          type: string
          format: date-time
          example: "2026-04-30T10:30:00.000Z"
          description: Data e hora em que o item foi deletado.



